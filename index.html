      const pFr=probs[c.probKey+'|fr']??PROB_DEFAULT;
      const pEn=probs[c.probKey+'|en']??PROB_DEFAULT;
      const learned=probToLearned((pFr+pEn)/2);
      const isMast=!!mastered[c.probKey];
      const isFlagged=flaggedFrs.has(c.fr);
      const isNew=isNewCard(addedDateByKey[c.probKey]||null);
      const rowId='br_'+c.probKey.replace(/[^a-zA-Z0-9]/g,'_')+'_'+idx;
      return `<div class="browse-row-wrap" id="wrap_${rowId}">
        <div class="browse-row-bg">
          <div class="browse-row-bg-left">★ Master</div>
          <div class="browse-row-bg-right">⚑ Flag</div>
        </div>
        <div class="browse-row ${isMast?'mast':''} ${isFlagged?'flagged-row':''}"
          id="${rowId}"
          ontouchstart="browseSwipeStart(event,'${rowId}','${c.probKey.replace(/'/g,'')}','${c.fr.replace(/'/g,'')}','${c.en.replace(/'/g,'')}')"
          ontouchmove="browseSwipeMove(event,'${rowId}')"
          ontouchend="browseSwipeEnd(event,'${rowId}','${c.probKey.replace(/'/g,'')}','${c.fr.replace(/'/g,'')}','${c.en.replace(/'/g,'')}')"
          ontouchcancel="browseSwipeCancel('${rowId}')">
          ${isNew?'<span class="browse-new-dot"></span>':''}
          <span class="browse-fr">${stripGender(c.fr)}</span>
          <span class="browse-en">${c.en}</span>
          <span class="browse-recall ${isMast?'mpct':''}">${isMast?'★':learned+'%'}</span>
        </div>
      </div>`;
    }).join('');

    return `<div>
      <div class="browse-cat-header" onclick="toggleBrowseCat('${label}')">
        <span class="browse-cat-title">${label}</span>
        <span class="browse-cat-count">${filtered.length} ${isOpen?'▾':'▸'}</span>
      </div>
      <div class="browse-cat-body ${isOpen?'':'collapsed'}">${rowsHtml}</div>
    </div>`;
  }).join('');

  const mastActive = _browseFilter.mastered;
  const flagActive = _browseFilter.flagged;

  document.getElementById('app').innerHTML = `
    <div class="browse-screen">
      <div class="browse-header">
        <h2>All Cards</h2>
        <input class="browse-search" type="search" placeholder="Search…" value="${query}"
          oninput="renderBrowse(this.value)" id="browseSearch"/>
        <button class="icon-btn" onclick="saveProgress();screen='home';render()">✕</button>
      </div>
      <div class="browse-filter-row">
        <button class="filter-pill ${mastActive?'active':''}" onclick="toggleBrowseFilter('mastered')">✓ Mastered</button>
        <button class="filter-pill ${flagActive?'active-flag':''}" onclick="toggleBrowseFilter('flagged')">⚑ Flagged</button>
        <button class="collapse-btn" onclick="collapseAllBrowse()">Collapse all</button>
      </div>
      <div class="browse-list">${sections||'<div style="padding:32px;color:var(--dim);text-align:center">No cards found</div>'}</div>
    </div>`;
}

function toggleBrowseFilter(f){
  _browseFilter[f]=!_browseFilter[f];
  renderBrowse(document.getElementById('browseSearch')?.value||'');
}
function toggleBrowseCat(label){
  _browseOpenCats[label] = _browseOpenCats[label]===false ? true : false;
  renderBrowse(document.getElementById('browseSearch')?.value||'');
}
function collapseAllBrowse(){
  ['Travel','Descriptors','Questions','Connectors','Family','Relationships','Québec',
   'Irregular Verbs','Regular Verbs','Permission','Jobs','Weather','Greetings','Navigation','Vocabulary'
  ].forEach(l=>_browseOpenCats[l]=false);
  renderBrowse(document.getElementById('browseSearch')?.value||'');
}

// ── SWIPE ACTIONS IN BROWSE ──
let _bsStart={}, _bsActive={};
function browseSwipeStart(e,id,pk,fr,en){
  _bsStart[id]={x:e.touches[0].clientX, pk, fr, en};
  _bsActive[id]=0;
}
function browseSwipeMove(e,id){
  if(!_bsStart[id]) return;
  const dx=e.touches[0].clientX-_bsStart[id].x;
  const el=document.getElementById(id);
  if(!el) return;
  if(Math.abs(dx)>8){
    e.preventDefault();
    el.style.transform=`translateX(${Math.max(-120,Math.min(120,dx))}px)`;
    _bsActive[id]=dx;
  }
}
function browseSwipeEnd(e,id,pk,fr,en){
  const dx=_bsActive[id]||0;
  const el=document.getElementById(id);
  if(!el) return;
  el.style.transform='';
  if(Math.abs(dx)>60){
    if(dx<0){
      // Swipe left = master toggle
      const isMast=!!mastered[pk];
      if(isMast){delete mastered[pk];probs[pk+'|fr']=PROB_DEFAULT;probs[pk+'|en']=PROB_DEFAULT;}
      else{markMastered(pk);}
      saveProgress();invalidateTierCache();
      showToast(isMast?'Unmarked as mastered':'Marked as mastered ★');
      setTimeout(()=>renderBrowse(document.getElementById('browseSearch')?.value||''),300);
    } else {
      // Swipe right = flag toggle
      const nowFlagged=toggleFlag(fr,en,'');
      showToast(nowFlagged?'⚑ Flagged for review':'Flag removed');
      setTimeout(()=>renderBrowse(document.getElementById('browseSearch')?.value||''),300);
    }
  }
  delete _bsStart[id]; delete _bsActive[id];
}
function browseSwipeCancel(id){
  const el=document.getElementById(id);
  if(el) el.style.transform='';
  delete _bsStart[id]; delete _bsActive[id];
}

function renderFlagged() {
  const flags = loadFlags();
  const rows = flags.length
    ? flags.map((f,i) => `
        <div class="browse-row" style="align-items:flex-start">
          <div style="flex:1">
            <div class="browse-fr">${f.fr}</div>
            <div class="browse-en">${f.en}</div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">${f.cat} · flagged ${f.flagged}</div>
          </div>
          <button onclick="unflagAt(${i})" style="background:none;border:1px solid var(--border);border-radius:100px;color:var(--dim);font-size:11px;padding:4px 10px;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif">Remove</button>
        </div>`).join('')
    : '<div style="padding:32px;color:var(--dim);text-align:center">No flagged cards</div>';

  document.getElementById('app').innerHTML = `
    <div class="browse-screen">
      <div class="browse-header">
        <h2 style="color:#e8934a">⚑ Flagged</h2>
        <span style="font-size:12px;color:var(--dim)">${flags.length} card${flags.length!==1?'s':''}</span>
        <button class="icon-btn" onclick="goHome()">✕</button>
      </div>
      <div class="browse-list">${rows}</div>
    </div>`;
}

function unflagAt(idx) {
  const flags = loadFlags();
  flags.splice(idx, 1);
  saveFlags(flags);
  renderFlagged();
}


// ── BROWSE LONG-PRESS MASTER/UNMASTER ──
let _browseLpTimer = null;
let _browseLpKey = null;
function browseTouchStart(e, probKey) {
  _browseLpKey = probKey;
  _browseLpTimer = setTimeout(() => { browseLongPress(null, probKey); }, 600);
}
function browseTouchEnd(e) {
  clearTimeout(_browseLpTimer);
  _browseLpTimer = null;
}
function browseLongPress(e, probKey) {
  if(e) e.preventDefault();
  clearTimeout(_browseLpTimer);
  const isMast = !!mastered[probKey];
  if(isMast) {
    // Unmaster
    delete mastered[probKey];
    probs[probKey+'|fr'] = PROB_DEFAULT;
    probs[probKey+'|en'] = PROB_DEFAULT;
    saveProgress();
    showToast('Unmarked as mastered');
  } else {
    markMastered(probKey);
    saveProgress();
    showToast('Marked as mastered ★');
  }
  // Re-render browse to reflect change
  renderBrowse(document.getElementById('browseSearch')?.value||'');
}





// ═══════════════════════════════════════════════════
// MODALS / UTILS
// ═══════════════════════════════════════════════════
function showModal(title,body,btns){
  closeModal();
  const el=document.createElement('div');el.className='modal-overlay';el.id='modalOverlay';
  el.innerHTML=`<div class="modal"><h2>${title}</h2><p>${body}</p><div class="modal-btns">${btns.map(b=>`<button class="modal-btn ${b.cls||''}" onclick="${b.action}">${b.label}</button>`).join('')}</div></div>`;
  document.body.appendChild(el);
}
function closeModal(){document.getElementById('modalOverlay')?.remove();}
function confirmReset(){showModal('Reset deck?','All recall percentages return to 50% and your progress clears.',[{label:'Cancel',action:'closeModal()'},{label:'Reset',cls:'danger',action:'doReset()'}]);}
function doReset(){closeModal();initProbs(true);showToast('Deck reset ✓');doPickNext();renderGame();}
function confirmHome(){
  clearInterval(timerInterval);
  if(timerMode>0){
    // Timed session: warn before interrupting
    showModal('End session?','Your timer will stop and this session won\'t count toward your high score.',[
      {label:'Cancel',action:'closeModal()'},
      {label:'End & save',cls:'danger',action:'endAndSaveHome()'}
    ]);
  } else {
    // Practice: just end cleanly and save
    endAndSaveHome();
  }
}
function endAndSaveHome(){
  closeModal();
  // Treat it like a session end — saves progress and shows score screen
  clearInterval(timerInterval);
  hsResult=null;
  screen='score';
  render();
  setTimeout(autoSaveProgress, 600);
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}


// ── FLAGGED CARDS ──
const FLAGS_KEY = 'francais_flags_v1';

function loadFlags() {
  try { return JSON.parse(localStorage.getItem(FLAGS_KEY)||'[]'); } catch{ return []; }
}
function saveFlags(flags) {
  try { localStorage.setItem(FLAGS_KEY, JSON.stringify(flags)); } catch{}
}
function isFlagged(fr, en) {
  const flags = loadFlags();
  return flags.some(f => f.fr === fr && f.en === en);
}
function toggleFlag(fr, en, cat) {
  const flags = loadFlags();
  const idx = flags.findIndex(f => f.fr === fr && f.en === en);
  if (idx > -1) {
    flags.splice(idx, 1); // unflag
  } else {
    flags.push({ fr, en, cat, flagged: new Date().toISOString().slice(0,10) });
  }
  saveFlags(flags);
  return idx === -1; // true = just flagged
}


// ═══════════════════════════════════════════════════
// BACKUP — EXPORT / IMPORT
// ═══════════════════════════════════════════════════
const BACKUP_FILENAME = 'francais-progress.json';

function buildBackupPayload() {
  return JSON.stringify({
    version: 2,
    saved: new Date().toISOString(),
    probs:   probs,
    mastered: mastered,
    flags:   loadFlags(),
  });
}

function triggerDownload(jsonStr) {
  try {
    const blob = new Blob([jsonStr], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = BACKUP_FILENAME;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    return true;
  } catch(e) {
    console.error('Export failed:', e);
    return false;
  }
}

function autoSaveProgress() {
  // Called after each session ends — fires alongside score screen render
  const ok = triggerDownload(buildBackupPayload());
  if (ok) showToast('Progress saved ✓');
}

function manualExport() {
  const ok = triggerDownload(buildBackupPayload());
  showToast(ok ? 'Progress exported ✓' : 'Export failed — try again');
}

function importProgress(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.probs) throw new Error('Invalid backup file');
      // Merge: imported probs take priority, new cards since backup get default prob
      Object.assign(probs, data.probs);
      if (data.mastered) Object.assign(mastered, data.mastered);
      if (data.flags)    saveFlags(data.flags);
      // Re-apply mastered prob caps
      Object.keys(mastered).forEach(k => {
        if (mastered[k]) { probs[k+'|fr'] = MASTERED_P; probs[k+'|en'] = MASTERED_P; }
      });
      saveProgress(); // write merged result back to localStorage too
      showToast('Progress restored ✓');
      renderHome();
    } catch(err) {
      showToast('Could not read backup file');
      console.error(err);
    }
  };
  reader.readAsText(file);
}

function triggerImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = (e) => importProgress(e.target.files[0]);
  document.body.appendChild(input);
  input.click();
  setTimeout(() => input.remove(), 2000);
}

let audioUnlocked = false; // iOS requires gesture before speech

// ── AUTO-CLEAR FLAGS IF CARD CONTENT CHANGED ──
function checkAndClearStaleFlags() {
  const flags = loadFlags();
  if (!flags.length) return;
  const allCards = [...VOCAB_POOL,...PHRASE_POOL,...JOB_POOL,...VERB_POOL,...PERM_POOL,
    ...TRAVEL_POOL,...DESCRIPTOR_POOL,...QUESTION_POOL,...CONNECTOR_POOL,
    ...(FAMILY_POOL||[]),...(RELATIONSHIP_POOL||[]),...(QUEBEC_POOL||[])];
  const currentContent = new Map();
  allCards.forEach(c => currentContent.set(c.fr+'||'+c.en, true));
  const kept = flags.filter(f => currentContent.has(f.fr+'||'+f.en));
  if (kept.length < flags.length) saveFlags(kept);
}

function speakFrench(text) {
  if(audioMuted) return;
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'fr-CA'; // Quebec French — falls back to fr-FR if unavailable
  utt.rate = 0.9;
  utt.pitch = 1;
  // Pick best available French voice
  const voices = window.speechSynthesis.getVoices();
  const frVoice = voices.find(v=>v.lang==='fr-CA') ||
                  voices.find(v=>v.lang==='fr-FR') ||
                  voices.find(v=>v.lang.startsWith('fr'));
  if(frVoice) utt.voice = frVoice;
  currentUtterance = utt;
  const btn = document.getElementById('speakBtn');
  utt.onstart = ()=>{ btn?.classList.add('speaking'); };
  utt.onend = ()=>{ btn?.classList.remove('speaking'); currentUtterance=null; };
  utt.onerror = ()=>{ btn?.classList.remove('speaking'); currentUtterance=null; };
  window.speechSynthesis.speak(utt);
  audioUnlocked = true;
}

function toggleMute(){
  audioMuted = !audioMuted;
  localStorage.setItem('muted', audioMuted);
  if(audioMuted) window.speechSynthesis.cancel();
  // Update button in topbar
  const btn = document.getElementById('muteBtn');
  if(btn){
    btn.textContent = audioMuted ? '🔇' : '🔊';
    btn.classList.toggle('muted', audioMuted);
  }
  showToast(audioMuted ? 'Audio muted' : 'Audio on');
}

// Ensure voices are loaded (Chrome loads them async)
if('speechSynthesis' in window){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = ()=>{ window.speechSynthesis.getVoices(); };
}

initProbs();
render();
